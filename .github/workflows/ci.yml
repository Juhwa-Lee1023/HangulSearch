name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"

jobs:
  test-debug:
    name: Test (Debug / Parallel)
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift Version
        run: swift --version

      - name: Run Unit Tests (Debug)
        run: swift test --parallel

  test-release:
    name: Test (Release)
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift Version
        run: swift --version

      - name: Run Unit Tests (Release)
        run: swift test -c release

  test-tsan:
    name: Test (Thread Sanitizer)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift Version
        run: swift --version

      - name: Run Unit Tests (TSan)
        run: swift test --sanitize=thread

  benchmark-smoke:
    name: Benchmark Smoke (Synthetic 10k)
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift Version
        run: swift --version

      - name: Run Benchmark Smoke
        run: swift test -c release --filter HangulSearchBenchmarkSmokeTests/testCombinedModeP95SmokeSynthetic10k
